version: "3.8"

services:
  mcp-itop:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-itop:latest
    container_name: mcp-itop
    restart: unless-stopped
    ports:
      - "8096:8096"
    environment:
      ITOP_URL: ${ITOP_URL}
      ITOP_VERSION: ${ITOP_VERSION:-1.3}
      ITOP_VERIFY_SSL: ${ITOP_VERIFY_SSL:-true}
      ITOP_TIMEOUT: ${ITOP_TIMEOUT:-30}
      # Optional: bind address/port used by the streamable-http transport.
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8096}
      # Public base URL of this MCP server. Required when running behind a
      # reverse proxy. The hostname is extracted and added to the MCP SDK's
      # DNS rebinding protection allowlist so clients connecting via the
      # public hostname are not rejected with 421 Misdirected Request.
      # Example: MCP_SERVER_URL=https://mcp.your-domain.com
      MCP_SERVER_URL: ${MCP_SERVER_URL:-}
      # Set to true to log full client<->mcp<->iTop request/response
      # payloads (auth secrets are always redacted). See DOCKER.md.
      MCP_DEBUG: ${MCP_DEBUG:-false}
      # SQLite database path for the attachment image store.
      # Defaults to /app/data/attachment_store.db inside the container.
      # Set IMAGE_STORE_DB to use a different path, e.g. on a named volume.
      IMAGE_STORE_DB: ${IMAGE_STORE_DB:-/app/data/attachment_store.db}
      # TTL in seconds for stored image entries (default: 3600 = 1 h).
      IMAGE_STORE_TTL: ${IMAGE_STORE_TTL:-3600}
      # NOTE: iTop authentication (ITOP_TOKEN / ITOP_USER / ITOP_PASSWORD)
      # is no longer set here. Each MCP client authenticates by sending
      # its own iTop API token as an "Authorization: Bearer <itop_token>"
      # HTTP header when connecting to this server.
    volumes:
      # Persist the SQLite attachment store across container restarts.
      # Remove or adjust if you prefer an in-container ephemeral store.
      - mcp-itop-data:/app/data

volumes:
  mcp-itop-data:
