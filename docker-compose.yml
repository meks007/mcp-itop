version: "3.8"

services:
  mcp-itop:
    build:
      context: .
      dockerfile: Dockerfile
    image: mcp-itop:latest
    container_name: mcp-itop
    restart: unless-stopped
    ports:
      - "8096:8096"
    environment:
      ITOP_URL: ${ITOP_URL}
      ITOP_VERSION: ${ITOP_VERSION:-1.3}
      ITOP_VERIFY_SSL: ${ITOP_VERIFY_SSL:-true}
      ITOP_TIMEOUT: ${ITOP_TIMEOUT:-30}

      # Optional: bind address/port used by the streamable-http transport.
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_PORT: ${MCP_PORT:-8096}

      # Public base URL of this MCP server. Required when running behind a
      # reverse proxy. The hostname is extracted and added to the MCP SDK's
      # DNS rebinding protection allowlist so clients connecting via the
      # public hostname are not rejected with 421 Misdirected Request.
      # Example: MCP_SERVER_URL=https://mcp.your-domain.com
      MCP_SERVER_URL: ${MCP_SERVER_URL:-}

      # Set to true to log full client<->mcp<->iTop request/response
      # payloads (auth secrets are always redacted). See DOCKER.md.
      MCP_DEBUG: ${MCP_DEBUG:-false}

      # Set to true to additionally log HTTP request/response headers.
      # Only takes effect when MCP_DEBUG=true. Secrets are always redacted.
      MCP_DEBUG_HEADERS: ${MCP_DEBUG_HEADERS:-false}

      # Set to true to additionally promote low-level third-party loggers to
      # DEBUG (sse_starlette, httpcore, PIL). Only takes effect when
      # MCP_DEBUG=true. May produce extremely large or high-frequency output.
      MCP_DEBUG_ALL: ${MCP_DEBUG_ALL:-false}

      # -- Database backend -------------------------------------------------
      # Select the db backend module (default: sqlite).
      # To add a new backend drop a file into server/db/ and set this var.
      DB_BACKEND: ${DB_BACKEND:-sqlite}

      # Path to the SQLite database file (used by db/sqlite.py).
      # Defaults to /app/data/mcp_itop.db inside the container.
      # Override or mount a volume onto /app/data to persist across restarts.
      SQLITE_DB_PATH: ${SQLITE_DB_PATH:-/app/data/mcp_itop.db}

      # Interval in seconds between background incremental_vacuum runs on
      # the SQLite database (default: 3600 = 1 h). Set to 0 to disable.
      SQLITE_VACUUM_INTERVAL: ${SQLITE_VACUUM_INTERVAL:-3600}

      # -- Attachment session TTL -------------------------------------------
      # How long (seconds) image entries stored by store_images() remain valid.
      # Default: 3600 s (1 h).
      IMAGE_STORE_TTL: ${IMAGE_STORE_TTL:-3600}

      # -- Image normalization ----------------------------------------------
      # Maximum image size in bytes. Images exceeding this limit are first
      # compressed via JPEG quality reduction, then downscaled if still too
      # large. Default: 1048576 (1 MB). Set to 0 to disable size capping.
      IMAGE_MAX_BYTES: ${IMAGE_MAX_BYTES:-1048576}

      # Starting JPEG quality for image normalization (1-95).
      # Reduced in steps (75, 60, 45, 30) before falling back to downscaling.
      # Default: 85.
      IMAGE_JPEG_QUALITY: ${IMAGE_JPEG_QUALITY:-85}

      # -- Caches -----------------------------------------------------------
      # TTL in seconds for the bearer token validation cache (sliding window).
      # Resets on every cache hit; token re-validated only after this many
      # seconds of inactivity. Set to 0 to disable caching. Default: 300 s.
      TOKEN_CACHE_TTL: ${TOKEN_CACHE_TTL:-300}

      # TTL in seconds for the resolve_key lookup cache (default: 86400 = 24 h).
      # Set to 0 to disable caching entirely.
      RESOLVE_KEY_CACHE_TTL: ${RESOLVE_KEY_CACHE_TTL:-86400}

      # Interval in seconds between background cleanup cycles.
      # All periodic activities (resolve_key cache eviction, expired image rows,
      # expired inline image ref rows) share this single interval.
      # Default: 300 s (5 min).
      CLEANUP_INTERVAL: ${CLEANUP_INTERVAL:-300}

      # TTL in seconds for inline image ref entries (default: 3600 = 1 h).
      # Entries older than this are treated as a cache miss and refreshed on
      # the next itop_get_ticket_images call.
      INLINE_IMAGE_REF_TTL: ${INLINE_IMAGE_REF_TTL:-3600}

      # NOTE: iTop authentication (ITOP_TOKEN / ITOP_USER / ITOP_PASSWORD)
      # is no longer set here. Each MCP client authenticates by sending
      # its own iTop API token as an "Authorization: Bearer <itop_token>"
      # HTTP header when connecting to this server.

    volumes:
      # Persist the SQLite database across container restarts.
      # Remove or adjust if you prefer an in-container ephemeral store.
      - mcp-itop-data:/app/data

volumes:
  mcp-itop-data:
